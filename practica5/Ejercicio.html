<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practica 4</title>
    <link rel="stylesheet" href="css.css">
    <script src="ejercicio.js"></script>
    <a href="../index.html">Volver al inicio</a>
</head>
<body>

    <h1>Formulario</h1>

    <form>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre">
        <br><br>

        <label for="correo">Correo:</label>
        <input type="email" id="correo">
        <br><br>

        <h3>Tipo de Fiesta:</h3>
        <input type="checkbox" id="cb1" value="boda">
        <label for="cb1">Boda</label><br>

        <input type="checkbox" id="cb2" value="graduacion">
        <label for="cb2">Graduacion</label><br>

        <input type="checkbox" id="cb3" value="xvs">
        <label for="cb3">XVs</label><br><br>

        <h3>Genero:</h3>
        <input type="radio" name="tipo" id="r1" value="hombre">
        <label for="r1">Hombre</label><br>

        <input type="radio" name="tipo" id="r2" value="mujer">
        <label for="r2">Mujer</label><br>

        <input type="radio" name="tipo" id="r3" value="otro">
        <label for="r3">Otro</label><br><br>

        <label for="fechaHora">Fecha y hora:</label>
        <input type="datetime-local" id="fechaHora">
        <br><br>

        <label for="color">Color favorito:</label>
        <input type="color" id="color">
        <br><br>

        <label for="rango">Capacidad de personas:</label>
        <input type="range" id="rango" min="0" max="100" value="50">
        <br><br>

        <button type="button" onclick="agregarFila()">Agregar a tabla</button>
    </form>

    <p id="mensaje"></p>

    <h2>Tabla de registros</h2>

    <table id="tabla">
        <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Tipo</th>
            <th>Genero</th>
            <th>Fecha/Hora</th>
            <th>Color</th>
            <th>Capacidad</th>
        </tr>
    </table>

</body>
</html>
